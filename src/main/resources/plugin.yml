name: DiscordLink
version: ${project.version}
main: com.discordlink.DiscordLinkPlugin
api-version: '1.21'
description: Links Minecraft accounts to Discord via a /link command.
authors: [ Faboit1 ]

commands:
  link:
    description: Link your Minecraft account to Discord using a verification code.
    usage: /link <code>
    aliases: [ discordlink ]

permissions:
  discordlink.link:
    description: Allows a player to use /link.
    default: true
